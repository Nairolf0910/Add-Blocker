<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weiterleitung blockiert – Redirect Guard</title>
  <meta name="description" content="Eine verdächtige Weiterleitung wurde von Redirect Guard blockiert.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/blocked.css">
</head>
<body>
  <!-- Ambient background effects -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <div class="bg-glow bg-glow--3"></div>

  <main class="container">
    <!-- Shield Icon -->
    <div class="shield" aria-hidden="true">
      <div class="shield__pulse"></div>
      <div class="shield__pulse shield__pulse--delayed"></div>
      <div class="shield__icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
          <path d="M12 2L3 7V12C3 17.25 6.75 22.13 12 23C17.25 22.13 21 17.25 21 12V7L12 2Z" 
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M15 9L9 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 9L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h1 class="title">Weiterleitung blockiert!</h1>
    <p class="subtitle">Redirect Guard hat eine verdächtige Weiterleitung erkannt und zu Ihrem Schutz blockiert.</p>

    <!-- Info Card -->
    <div class="info-card">
      <div class="info-card__row">
        <div class="info-card__label">
          <span class="info-card__icon">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
            </svg>
          </span>
          Blockierte URL
        </div>
        <div class="info-card__value">
          <code id="blockedUrl" class="url-display">—</code>
        </div>
      </div>

      <div class="info-card__divider"></div>

      <div class="info-card__row">
        <div class="info-card__label">
          <span class="info-card__icon info-card__icon--source">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M9.293 2.293a1 1 0 011.414 0l7 7A1 1 0 0117 11h-1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-3a1 1 0 00-1-1H9a1 1 0 00-1 1v3a1 1 0 01-1 1H5a1 1 0 01-1-1v-6H3a1 1 0 01-.707-1.707l7-7z" clip-rule="evenodd"/>
            </svg>
          </span>
          Herkunft
        </div>
        <div class="info-card__value">
          <code id="sourceUrl" class="url-display url-display--source">—</code>
        </div>
      </div>

      <div class="info-card__divider"></div>

      <div class="info-card__row">
        <div class="info-card__label">
          <span class="info-card__icon info-card__icon--reason">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" clip-rule="evenodd"/>
            </svg>
          </span>
          Grund
        </div>
        <div class="info-card__value">
          <span id="reason" class="reason-badge">—</span>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button id="btnGoBack" class="btn btn--safe" type="button">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 111.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z" clip-rule="evenodd"/>
        </svg>
        Zurück zur Seite
      </button>

      <button id="btnWhitelist" class="btn btn--accent" type="button">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd"/>
        </svg>
        Domain erlauben
      </button>

      <button id="btnProceed" class="btn btn--danger-ghost" type="button">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
        </svg>
        Trotzdem öffnen
      </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Geschützt durch <strong>Redirect Guard</strong> — Ihr Schutzschild gegen unerwünschte Weiterleitungen.</p>
    </footer>
  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="blocked.js"></script>
</body>
</html>
